<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Saver Blood Donation Program</title>

    
    <style>
        label {
    font-weight: bold;
}

textarea {
    resize: none;
}

input[type="radio"] {
    width: auto;
}

input[type="checkbox"] {
    width: auto;
}
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        h2 {
            text-align: center;
            color: navy;
        }
        form {
            width: 800px;
            margin: auto;
            padding: 30px;
            background-color: white;
            border: 1px solid gray;
            border-radius: 10px;
        }
        input,
        textarea,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <h2 style="text-decoration: underline;">
        Life Saver Blood Donation Program
    </h2>

    <form action="#" method="post">

        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname" required><br><br>

        <label for="age">Age:</label><br>
        <input type="number" id="age" name="age" required><br><br>

        <label>Gender:</label><br>

        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>

        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label><br><br>

        <label for="blood group">Blood group:</label><br>
        <select id="blood group" name="blood group">
            <option value="A+">A+</option>
            <option value="B+">B+</option>
            <option value="O+">O+</option>
            <option value="AB+">AB+</option>
            <option value="A-">A-</option>
            <option value="B-">B-</option>
            <option value="O-">O-</option>
            <option value="AB-">AB-</option>

        </select><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="address">Address:</label><br>
        <textarea id="address" name="address" rows="4"></textarea><br><br>

        <label for="dob">Last donation date:</label><br>
        <input type="date" id="dob" name="dob"><br><br>

        <label for="message"> Health Condition:</label><br>
        <input type="text" id="message" name="message"><br><br>


        <input type="submit" value="Register" style="background-color: green; color: white;">

        <input type="reset" value="Reset" style="background-color: red; color: white;">
    </form>

    <form action="#" method="post">
        <h2 style="text-decoration: underline;">
        Blood Request Form
    </h2>
    <label for="patient name">Patient name:</label><br>
        <input type="text" id="patient name" name="patient name" required><br><br>

        <label for="required blood group">Required Blood group:</label><br>
        <select id="required blood group" name="required blood group">
            <option value="A+">A+</option>
            <option value="B+">B+</option>
            <option value="O+">O+</option>
            <option value="AB+">AB+</option>
            <option value="A-">A-</option>
            <option value="B-">B-</option>
            <option value="O-">O-</option>
            <option value="AB-">AB-</option>

            </select><br><br>

            <label for="hospital name">Hospital name:</label><br>
        <input type="text" id="hospital name" name="hospital name" required><br><br>

        <label for="phone">Emergency Contact Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>

        <label for="dob">Required Date:</label><br>
        <input type="date" id="dob" name="dob"><br><br>

        <label for="message"> Additional Message:</label><br>
        <input type="text" id="message" name="message"><br><br>


<input type="submit" value="Register" style="background-color: green; color: white;">

        <input type="reset" value="Reset" style="background-color: red; color: white;">


    </form>



</body>

</html>
